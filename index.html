<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Journal Layout Planner</title>
<style>
  :root{
    --bg:#faf5ee; --card:#fffdf9; --paper:#fffefa;
    --ink:#4a3f35; --ink-soft:#8a7a68; --line:#e9dfd2;
    --accent:#c96f4a; --accent-soft:#f3e2d6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  body{padding:16px 14px calc(24px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;}
  header h1{font-size:1.25rem; font-weight:700; letter-spacing:.01em;}
  header p{font-size:.8rem; color:var(--ink-soft); margin-top:2px;}
  .screen.hidden{display:none;}
  .section{margin-top:18px;}
  .section h2{font-size:.72rem; text-transform:uppercase; letter-spacing:.08em;
    color:var(--ink-soft); margin-bottom:8px; font-weight:600;}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{flex:1 1 0; min-width:68px; min-height:44px; background:var(--card);
    color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:6px 8px;
    font-size:.82rem; font-weight:500; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1px;}
  .seg button small{font-size:.62rem; color:var(--ink-soft); font-weight:400;}
  .seg button.on{background:var(--accent-soft); border-color:var(--accent); font-weight:600;}
  .elrow{display:flex; align-items:center; justify-content:space-between;
    padding:7px 0; border-bottom:1px solid var(--line);}
  .elrow:last-child{border-bottom:none;}
  .elrow .lbl{font-size:.85rem;}
  .elrow .lbl small{display:block; color:var(--ink-soft); font-size:.68rem;}
  .stepper{display:flex; align-items:center; border:1px solid var(--line);
    border-radius:10px; background:var(--card); overflow:hidden;}
  .stepper button{background:none; border:none; color:var(--accent); width:44px;
    height:44px; min-height:44px; font-size:1.3rem; padding:0; border-radius:0;}
  .stepper button:disabled{color:var(--line);}
  .stepper .val{min-width:28px; text-align:center; font-size:.9rem; font-weight:600;}
  .details{margin-top:8px; display:flex; flex-direction:column; gap:8px;}
  .slot{display:flex; gap:8px; align-items:center;}
  .slot select, .details input[type=text], .details textarea, .details select{
    width:100%; background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; font-size:16px; color:var(--ink); font-family:inherit;
    appearance:none; -webkit-appearance:none;}
  .details textarea{min-height:64px; resize:vertical;}
  .slot img{width:44px; height:44px; object-fit:cover; border-radius:8px;
    border:1px solid var(--line); flex:none;}
  .slot .emoji-in{width:64px; flex:none; text-align:center; font-size:1.15rem;}
  .mini{background:var(--card); color:var(--accent); border:1px solid var(--line);
    font-size:.75rem; padding:0 10px; min-height:44px; white-space:nowrap;
    border-radius:10px; font-weight:600; flex:none;}
  label.mini{display:inline-flex; align-items:center; justify-content:center;
    position:relative; cursor:pointer;}
  label.mini input[type=file]{position:absolute; width:1px; height:1px;
    opacity:0; overflow:hidden; clip:rect(0 0 0 0);}
  .chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{display:flex; align-items:center; gap:6px; background:var(--card);
    border:1px solid var(--line); border-radius:999px; padding:0 12px;
    min-height:40px; font-size:.78rem; color:var(--ink);}
  .chip.on{border-color:var(--accent); background:var(--accent-soft); font-weight:600;}
  .chip .dots{display:flex; gap:2px;}
  .chip .dots i{width:10px; height:10px; border-radius:50%; display:block;
    border:1px solid #00000014;}
  .cta{width:100%; min-height:50px; font-size:.95rem; margin-top:20px;
    position:sticky; bottom:12px; box-shadow:0 4px 14px rgba(120,60,30,.25);}
  .warn-actions{display:flex; gap:8px; margin-top:8px;}
  .warn-actions .ghost{background:transparent; color:#8a5a34; border:1px solid #ecd3bd;}
  .bar{display:flex; gap:8px; align-items:center; margin:14px 0 6px;}
  .bar .ghost{background:var(--card); color:var(--ink); border:1px solid var(--line);}
  .bar .spacer{flex:1;}
  .summary{font-size:.75rem; color:var(--ink-soft); margin:4px 0 8px;}
  .tabs{display:flex; gap:6px; margin:8px 0;}
  .tabs button{flex:1; background:var(--card); color:var(--ink); border:1px solid var(--line);}
  .tabs button.on{background:var(--accent-soft); border-color:var(--accent); font-weight:600;}
  .tabs.hidden{display:none;}
  .hint{font-size:.72rem; color:var(--ink-soft); text-align:center; margin-top:10px;}
  select{flex:1; min-width:0; appearance:none; -webkit-appearance:none;
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; font-size:.85rem; color:var(--ink);}
  button{background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:10px 16px; font-size:.85rem; font-weight:600; cursor:pointer;
    min-height:44px;}
  button:active{opacity:.85;}
  .warn{display:none; background:#fbeee2; border:1px solid #ecd3bd; color:#8a5a34;
    border-radius:10px; padding:8px 12px; font-size:.78rem; margin:6px 0;}
  .warn.show{display:block;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:8px; box-shadow:0 1px 3px rgba(120,90,60,.06);}
  .thumb{display:flex; align-items:center; justify-content:center;}
  .thumb svg{width:100%; height:auto; display:block; border-radius:6px;}
  .cap{font-size:.72rem; color:var(--ink-soft); text-align:center; margin-top:6px;}
  .cap b{color:var(--ink); font-weight:600;}
  footer{margin-top:18px; font-size:.72rem; color:var(--ink-soft); text-align:center;}
</style>
</head>
<body>
<header>
  <h1>Journal Layout Planner</h1>
  <p>Pick your page and elements — get four layout ideas</p>
</header>

<div id="screen-input" class="screen">
  <div class="section"><h2>Notebook size</h2>
    <div class="seg" data-key="size">
      <button data-v="A5">A5<small>14.8 × 21 cm</small></button>
      <button data-v="B6">B6<small>12.5 × 17.6 cm</small></button>
      <button data-v="A6">A6<small>10.5 × 14.8 cm</small></button>
      <button data-v="TN" class="on">TN<small>11 × 21 cm</small></button>
    </div>
  </div>
  <div class="section"><h2>Page</h2>
    <div class="seg" data-key="mode">
      <button data-v="single" class="on">Single</button>
      <button data-v="spread">Spread</button>
      <button data-v="two">Two pages</button>
    </div>
  </div>
  <div class="section"><h2>Orientation</h2>
    <div class="seg" data-key="orientation">
      <button data-v="vertical" class="on">Vertical</button>
      <button data-v="horizontal">Horizontal</button>
    </div>
  </div>
  <div class="section"><h2>Density</h2>
    <div class="seg" data-key="density">
      <button data-v="airy">Airy</button>
      <button data-v="balanced" class="on">Balanced</button>
      <button data-v="packed">Packed</button>
    </div>
  </div>
  <div class="section"><h2>Colour palette</h2>
    <div class="chips" id="chipsInput"></div>
  </div>
  <div class="section"><h2>Elements</h2>
    <div id="elementRows"></div>
  </div>
  <div id="detailSections"></div>
  <div class="warn" id="feasWarn"></div>
  <button class="cta" id="generate">Generate 4 layouts</button>
</div>

<div id="screen-suggest" class="screen hidden">
  <div class="bar">
    <button class="ghost" id="back">‹ Inputs</button>
    <div class="spacer"></div>
    <button id="regen">Regenerate</button>
  </div>
  <p class="summary" id="summary"></p>
  <div class="tabs hidden" id="pageTabs">
    <button data-p="0" class="on">Page 1</button>
    <button data-p="1">Page 2</button>
  </div>
  <div class="chips" id="chipsSuggest"></div>
  <div class="warn" id="warn"></div>
  <div class="grid" id="grid"></div>
  <p class="hint">Tap-to-edit arrives in the next phase.</p>
</div>

<footer>Everything stays on your device — photos and text are never uploaded.</footer>

<script>
'use strict';
/* =====================================================================
   1. GEOMETRY MODEL — all units are centimeters, origin top-left
   ===================================================================== */
const NOTEBOOKS = {
  A5:{w:14.8, h:21.0}, B6:{w:12.5, h:17.6}, A6:{w:10.5, h:14.8}, TN:{w:11.0, h:21.0}
};
const MARGIN = 0.5;          // outer margin, all edges (PRD 5.1)
const GUTTER_HALF = 0.8;     // dead zone each side of spine (PRD 5.3)
const DENSITY = {airy:0.45, balanced:0.65, packed:0.85};
const SCALE_MIN = 0.6, SCALE_MAX = 1.3;   // soft element scaling (PRD 5.4)
const WASHI_W = 1.5;

function makePage(sc){
  let {w,h} = NOTEBOOKS[sc.size];
  if(sc.orientation === 'horizontal'){ const t=w; w=h; h=t; }
  let spine = null;
  if(sc.mode === 'spread'){
    if(sc.orientation === 'vertical'){ w *= 2; spine = {axis:'v', pos:w/2}; }
    else                             { h *= 2; spine = {axis:'h', pos:h/2}; }
  }
  const usable = {x:MARGIN, y:MARGIN, w:w-2*MARGIN, h:h-2*MARGIN};
  let gutter = null;
  if(spine){
    gutter = spine.axis==='v'
      ? {x:spine.pos-GUTTER_HALF, y:0, w:2*GUTTER_HALF, h:h}
      : {x:0, y:spine.pos-GUTTER_HALF, w:w, h:2*GUTTER_HALF};
  }
  return {w, h, spine, gutter, usable};
}

/* ---- element type table (PRD 6) ---- */
const EL = {
  photoL:   {label:'Landscape photo', w:10.0, h:7.5,  kind:'photo'},
  photoP:   {label:'Portrait photo',  w:7.5,  h:10.0, kind:'photo'},
  sketchS:  {label:'Small sketch',    w:4.0,  h:4.0,  kind:'sketch'},
  sketchL:  {label:'Large sketch',    w:10.0, h:6.0,  kind:'sketch'},
  washi:    {label:'Washi tape',      w:6.0,  h:WASHI_W, kind:'washi'},
  headline: {label:'Headline',        w:0,    h:1.5,  kind:'text'},
  paragraph:{label:'Paragraph',       w:0,    h:0,    kind:'text'},
  emoji:    {label:'Emoji',           w:1.4,  h:1.4,  kind:'emoji'}
};
const PARA_LH = {8:0.35, 10:0.42, 12:0.50};  // line heights in cm (PRD 6, #7)

/* ---- rect helpers ---- */
function bbox(el){
  if(!el.rot) return {x:el.x, y:el.y, w:el.w, h:el.h};
  const r = el.rot*Math.PI/180, cx = el.x+el.w/2, cy = el.y+el.h/2;
  const c = Math.abs(Math.cos(r)), s = Math.abs(Math.sin(r));
  const w = el.w*c + el.h*s, h = el.w*s + el.h*c;
  return {x:cx-w/2, y:cy-h/2, w, h};
}
function overlapRect(a,b){
  const x = Math.max(a.x,b.x), y = Math.max(a.y,b.y);
  const X = Math.min(a.x+a.w, b.x+b.w), Y = Math.min(a.y+a.h, b.y+b.h);
  return (X>x && Y>y) ? {x, y, w:X-x, h:Y-y} : null;
}
function contains(outer, inner){
  return inner.x >= outer.x && inner.y >= outer.y &&
         inner.x+inner.w <= outer.x+outer.w && inner.y+inner.h <= outer.y+outer.h;
}
function centerOf(r){ return {x:r.x+r.w/2, y:r.y+r.h/2}; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function clampToUsable(el, page){
  const u = page.usable, b = bbox(el);
  if(b.w >= u.w) el.x += (u.x+u.w/2) - (b.x+b.w/2);
  else if(b.x < u.x) el.x += u.x - b.x;
  else if(b.x+b.w > u.x+u.w) el.x -= (b.x+b.w) - (u.x+u.w);
  const b2 = bbox(el);
  if(b2.h >= u.h) el.y += (u.y+u.h/2) - (b2.y+b2.h/2);
  else if(b2.y < u.y) el.y += u.y - b2.y;
  else if(b2.y+b2.h > u.y+u.h) el.y -= (b2.y+b2.h) - (u.y+u.h);
}

/* Gutter rules (PRD 5.3): text/emoji/small sketch stay fully out of the dead
   zone; photos and large sketches may cross the spine but keep their center
   (focal area) out of it; washi is free to cross. */
function gutterFix(el, page){
  const g = page.gutter;
  if(!g || el.kind === 'washi') return;
  const strict = el.kind==='text' || el.kind==='emoji' || el.t==='sketchS';
  const b = bbox(el), c = centerOf(b), axis = page.spine.axis, spine = page.spine.pos;
  if(strict){
    if(!overlapRect(b,g)) return;
    if(axis==='v') el.x += (c.x < spine) ? (g.x - (b.x+b.w)) : ((g.x+g.w) - b.x);
    else           el.y += (c.y < spine) ? (g.y - (b.y+b.h)) : ((g.y+g.h) - b.y);
  } else {
    const inBand = (axis==='v') ? (c.x > g.x && c.x < g.x+g.w)
                                : (c.y > g.y && c.y < g.y+g.h);
    if(!inBand) return;
    if(axis==='v') el.x += (c.x <= spine) ? (g.x - c.x) : ((g.x+g.w) - c.x);
    else           el.y += (c.y <= spine) ? (g.y - c.y) : ((g.y+g.h) - c.y);
  }
  clampToUsable(el, page);
}

/* =====================================================================
   2. SEEDED RANDOMNESS
   ===================================================================== */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function pick(rng, arr){ return arr[Math.floor(rng()*arr.length)]; }
function rrange(rng,a,b){ return a + rng()*(b-a); }
function shuffle(rng, arr){
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(rng()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
const usedSeeds = new Set();
function newSeed(){
  let s;
  do { s = Math.floor(Math.random()*0xFFFFFFFF); } while(usedSeeds.has(s));
  usedSeeds.add(s);
  return s;
}

/* =====================================================================
   3. ELEMENT INSTANTIATION + DENSITY SCALING
   ===================================================================== */
/* Color palettes (post-PRD addition): data-driven like archetypes.
   `washi` = [base, accent] pairs; `photo` = [top, bottom] gradient pairs. */
const PALETTES = {
  greytones: { label:'Greytones',
    washi: [['#4a4a4a','#7d7d7d'], ['#8f8f8f','#c4c4c4'], ['#666666','#a8a8a8'],
            ['#b5b5b5','#e2e2e2']],
    photo: [['#dcdcdc','#9c9c9c'], ['#c4c4c4','#7e7e7e'], ['#e6e6e6','#ababab'],
            ['#a8a8a8','#5f5f5f']] },
  nature: { label:'Nature',
    washi: [['#9dbfb2','#d6e8e1'], ['#7fa896','#b8d2c4'], ['#9fb4d8','#dce4f2'],
            ['#84a5a8','#c2d8da'], ['#b3c9a1','#dde9d2']],
    photo: [['#bcd2c5','#7fa896'], ['#c8d4e8','#8fa3c4'], ['#d3e2d0','#93b58e'],
            ['#bfd8dc','#7fa4ad']] },
  city: { label:'City',
    washi: [['#3d3d3d','#6e6e6e'], ['#c4574e','#e8a29c'], ['#d98a4f','#f2c9a4'],
            ['#8d6fa8','#c9b6dc']],
    photo: [['#e0a875','#b05c3a'], ['#c9b6dc','#7a5c9e'], ['#d8d8d8','#5a5a5a'],
            ['#e8a29c','#a34a42']] },
  colourful: { label:'Colourful',
    washi: [['#e8a0a0','#f6d3d3'], ['#9dbfb2','#d6e8e1'], ['#e2b95c','#f6e6bd'],
            ['#9fb4d8','#dce4f2'], ['#cf9cbd','#eddbe7'], ['#c9a06b','#ecd9bd']],
    photo: [['#f2c9a4','#d98e73'], ['#bcd2c5','#7fa896'], ['#e8d3a8','#c2a36b'],
            ['#c8d4e8','#8fa3c4'], ['#e8c4c4','#c48f8f']] },
  muted: { label:'Muted',
    washi: [['#e6dcd2','#f3ede6'], ['#d9cfc4','#ece5dc'], ['#d5d8cf','#e9ebe4'],
            ['#e3d3cd','#f2e8e4'], ['#dcd6ca','#eeeae0']],
    photo: [['#efe3d5','#d8c5b0'], ['#e2e0d5','#c8c5b4'], ['#e9dcd4','#cdb9ad'],
            ['#e0e2dc','#bfc4bb']] }
};
const PHOTO_MOTIFS = ['landscape','city','abstract'];

function headlineSize(el){
  el.h = 1.5 * el.s;
  el.w = Math.max(2.5, el.text.length * 0.36 * el.h);
}
function setParagraphWidth(el, width){
  el.w = Math.max(2.5, width);
  const lh = PARA_LH[el.size] || PARA_LH[10];
  const charW = 0.32 * lh;
  const cpl = Math.max(8, Math.floor(el.w / charW));
  const words = el.text.split(/\s+/);
  const lines = [];
  let line = '';
  for(const wd of words){
    const cand = line ? line + ' ' + wd : wd;
    if(cand.length > cpl && line){ lines.push(line); line = wd; }
    else line = cand;
  }
  if(line) lines.push(line);
  el.lines = lines; el.lh = lh;
  el.h = lines.length * lh + 0.2;
}
/* rescale relative to type default, clamped to 60–130% (PRD 5.4) */
function scaleEl(el, f){
  if(el.t === 'paragraph' || el.kind === 'washi') return;
  el.s = clamp(el.s * f, SCALE_MIN, SCALE_MAX);
  if(el.t === 'headline'){ headlineSize(el); return; }
  el.w = EL[el.t].w * el.s;
  el.h = EL[el.t].h * el.s;
}

function prepareElements(sc, page, rng, palette){
  const u = page.usable;
  const els = sc.elements.map((e,i)=>{
    const d = EL[e.t];
    const el = {id:i, t:e.t, kind:d.kind, w:d.w, h:d.h, x:0, y:0, rot:0, z:10,
                s:1, text:e.text||'', char:e.char||'✿', size:e.size||10,
                placed:false, role:null, attach:null};
    if(e.t==='headline') headlineSize(el);
    if(e.t==='paragraph') setParagraphWidth(el, Math.min(8, u.w*0.65));
    if(d.kind==='photo'){
      el.motif = e.motif || pick(rng, PHOTO_MOTIFS);
      el.src = e.src || null;   /* user-uploaded photo as local data URL */
      el.pal = pick(rng, palette.photo);
    }
    if(d.kind==='washi'){
      el.colors = pick(rng, palette.washi);
      el.pattern = pick(rng, ['stripes','dots','plain']);
    }
    return el;
  });
  /* density scaling: solve a global scale for photos/sketches/headline so
     total coverage approaches the density target */
  const target = DENSITY[sc.density] * u.w * u.h;
  let fixed = 0, scalable = 0;
  for(const el of els){
    const a = el.w*el.h;
    if(el.kind==='photo' || el.kind==='sketch' || el.t==='headline') scalable += a;
    else fixed += a;
  }
  if(scalable > 0){
    /* density is a ceiling: shrink firmly to get under it, upscale only mildly */
    const f = clamp(Math.sqrt(Math.max(0.05, target - fixed) / scalable), SCALE_MIN, 1.1);
    for(const el of els) scaleEl(el, f);
  }
  return els;
}

/* feasibility check (PRD 5.4): can everything fit even at minimum scale? */
function feasibility(sc, page){
  const u = page.usable;
  let minArea = 0;
  for(const e of sc.elements){
    const d = EL[e.t];
    if(d.kind==='photo' || d.kind==='sketch') minArea += d.w*d.h*SCALE_MIN*SCALE_MIN;
    else if(d.kind==='washi') minArea += 5*WASHI_W;
    else if(e.t==='headline') minArea += 6*1.5*SCALE_MIN;
    else if(e.t==='paragraph') minArea += 8;
    else minArea += d.w*d.h;
  }
  const maxCover = Math.min(0.9, DENSITY[sc.density] + 0.15);
  return minArea <= u.w*u.h*maxCover;
}

/* =====================================================================
   4. SHARED PLACEMENT TOOLKIT
   ===================================================================== */
const GRID_SNAP = 0.25;
function snap(el){ el.x = Math.round(el.x/GRID_SNAP)*GRID_SNAP;
                   el.y = Math.round(el.y/GRID_SNAP)*GRID_SNAP; }
function placeCenter(el, cx, cy){ el.x = cx-el.w/2; el.y = cy-el.h/2; el.placed = true; }

function byKind(els){
  return {
    visuals: els.filter(e=>e.kind==='photo'||e.kind==='sketch'),
    texts:   els.filter(e=>e.kind==='text'),
    washis:  els.filter(e=>e.kind==='washi'),
    emojis:  els.filter(e=>e.kind==='emoji')
  };
}

/* find an open spot for a w×h element, maximizing distance to placed items */
function findSpot(els, page, w, h, rng, opts){
  opts = opts || {};
  const u = page.usable, tries = opts.tries || 40;
  const placed = els.filter(e=>e.placed && e.kind!=='washi');
  let best = null, bestScore = -1e9;
  for(let i=0;i<tries;i++){
    const x = u.x + rng()*Math.max(0.01, u.w-w);
    const y = u.y + rng()*Math.max(0.01, u.h-h);
    const r = {x,y,w,h};
    if(page.gutter && opts.avoidGutter !== false && overlapRect(r, page.gutter)) continue;
    let score = 1e9;
    for(const p of placed){
      const pb = bbox(p), pc = centerOf(pb), rc = centerOf(r);
      const d = Math.hypot(pc.x-rc.x, pc.y-rc.y) - Math.max(pb.w,pb.h)/2;
      score = Math.min(score, d);
    }
    if(opts.bias){
      const rc = centerOf(r);
      score -= Math.hypot(rc.x-opts.bias.x, rc.y-opts.bias.y)*0.6;
    }
    if(score > bestScore){ bestScore = score; best = {x,y}; }
  }
  return best || {x:u.x, y:u.y};
}

/* place el adjacent to target, trying 8 directions, least overlap wins */
function placeAround(el, target, els, page, rng, preferAngles){
  const u = page.usable, tb = bbox(target), tc = centerOf(tb);
  const gap = 0.35;
  const angles = (preferAngles || []).concat(shuffle(rng,[0,45,90,135,180,225,270,315]));
  const placed = els.filter(e=>e.placed && e!==el && e.kind!=='washi');
  let best = null, bestScore = -1e9;
  for(const a of angles){
    const rad = a*Math.PI/180, dx = Math.cos(rad), dy = Math.sin(rad);
    const cx = tc.x + dx*((tb.w+el.w)/2 + gap);
    const cy = tc.y + dy*((tb.h+el.h)/2 + gap);
    const r = {x:cx-el.w/2, y:cy-el.h/2, w:el.w, h:el.h};
    let score = rng()*0.3;
    /* penalize overflow beyond usable area */
    const ox = Math.max(0, u.x-r.x) + Math.max(0, r.x+r.w-(u.x+u.w));
    const oy = Math.max(0, u.y-r.y) + Math.max(0, r.y+r.h-(u.y+u.h));
    score -= (ox+oy)*8;
    for(const p of placed){
      const o = overlapRect(r, bbox(p));
      if(o) score -= o.w*o.h*6;
    }
    if(page.gutter && (el.kind==='text'||el.kind==='emoji')){
      const og = overlapRect(r, page.gutter);
      if(og) score -= og.w*og.h*6;
    }
    if(score > bestScore){ bestScore = score; best = {cx, cy}; }
  }
  placeCenter(el, best.cx, best.cy);
  clampToUsable(el, page);
}

/* push apart overlapping non-washi elements */
function resolveOverlaps(els, page, allowFrac){
  const items = els.filter(e=>e.placed && e.kind!=='washi');
  for(let iter=0; iter<14; iter++){
    let moved = false;
    for(let i=0;i<items.length;i++) for(let j=i+1;j<items.length;j++){
      const a = items[i], b = items[j];
      const ab = bbox(a), bb = bbox(b);
      const o = overlapRect(ab, bb);
      if(!o) continue;
      if(allowFrac){
        const frac = o.w*o.h / Math.min(ab.w*ab.h, bb.w*bb.h);
        if(frac < allowFrac) continue;
      }
      const ac = centerOf(ab), bc = centerOf(bb);
      if(o.w < o.h){
        const push = o.w/2 + 0.08, dir = ac.x <= bc.x ? -1 : 1;
        a.x += dir*push; b.x -= dir*push;
      } else {
        const push = o.h/2 + 0.08, dir = ac.y <= bc.y ? -1 : 1;
        a.y += dir*push; b.y -= dir*push;
      }
      clampToUsable(a, page); clampToUsable(b, page);
      moved = true;
    }
    if(!moved) break;
  }
}

/* ---- washi role placers (PRD 6.5) ---- */
function washiBorder(el, page, rng){
  el.role = 'border';
  const u = page.usable;
  const side = pick(rng, ['top','bottom','left','right']);
  if(side==='top' || side==='bottom'){
    el.w = u.w*rrange(rng,0.9,1.0); el.h = WASHI_W;
    el.x = u.x + (u.w-el.w)/2;
    el.y = side==='top' ? u.y + 0.05 : u.y + u.h - el.h - 0.05;
  } else {
    el.w = WASHI_W; el.h = u.h*rrange(rng,0.9,1.0);
    el.y = u.y + (u.h-el.h)/2;
    el.x = side==='left' ? u.x + 0.05 : u.x + u.w - el.w - 0.05;
  }
  el.rot = rrange(rng,-1,1);
  el.z = 6; el.placed = true;
}
function washiDividerH(el, page, y, rng){
  el.role = 'divider';
  const u = page.usable;
  el.w = u.w*rrange(rng,0.85,1.0); el.h = WASHI_W;
  el.x = u.x + (u.w-el.w)/2; el.y = y - el.h/2;
  el.rot = rrange(rng,-1,1); el.z = 25; el.placed = true;
  clampToUsable(el, page);
}
function washiDividerV(el, page, x, rng){
  el.role = 'divider';
  const u = page.usable;
  el.w = WASHI_W; el.h = u.h*rrange(rng,0.85,1.0);
  el.x = x - el.w/2; el.y = u.y + (u.h-el.h)/2;
  el.rot = rrange(rng,-1,1); el.z = 25; el.placed = true;
  clampToUsable(el, page);
}
function washiDiagonal(el, page, rng){
  el.role = 'diagonal';
  const u = page.usable;
  el.w = Math.min(u.w,u.h)*rrange(rng,0.55,0.85); el.h = WASHI_W;
  const sign = rng()<0.5 ? 1 : -1;
  el.rot = sign*rrange(rng,8,30);
  /* may deliberately cross the spine (PRD 5.3) */
  const cx = page.gutter && rng()<0.55 && page.spine.axis==='v'
    ? page.spine.pos + rrange(rng,-1,1)
    : u.x + rrange(rng,0.3,0.7)*u.w;
  const cy = page.gutter && page.spine.axis==='h' && rng()<0.55
    ? page.spine.pos + rrange(rng,-1,1)
    : u.y + rrange(rng,0.25,0.75)*u.h;
  placeCenter(el, cx, cy);
  el.z = 45;
  clampToUsable(el, page);
}
function washiAnchor(el, photo, corner, rng){
  el.role = 'anchor';
  el.attach = {id:photo.id, corner};
  el.w = rrange(rng,2.5,3.4); el.h = WASHI_W*0.85;
  el.rot = (corner===0 || corner===3 ? -45 : 45) + rrange(rng,-12,12);
  el.z = 60; el.placed = true;
}
/* anchors follow their photo; run after all other adjustments */
function settleAnchors(els, page){
  for(const el of els){
    if(!el.attach) continue;
    const target = els.find(e=>e.id===el.attach.id);
    if(!target){ el.placed = false; continue; }
    const b = {x:target.x, y:target.y, w:target.w, h:target.h};
    const pts = [
      {x:b.x, y:b.y}, {x:b.x+b.w, y:b.y},
      {x:b.x+b.w, y:b.y+b.h}, {x:b.x, y:b.y+b.h}
    ];
    const p = pts[el.attach.corner % 4];
    placeCenter(el, p.x, p.y);
    clampToUsable(el, page);
  }
}

/* =====================================================================
   5. ARCHETYPES (PRD 7.2) — parameterized placement strategies
   ===================================================================== */
const ARCHETYPES = [

{ name:'Grid',
  score(ctx){ return 1 + 0.12*ctx.counts.visuals; },
  place(ctx){
    const {els, page, rng} = ctx;
    const u = page.usable;
    const {visuals, texts, washis, emojis} = byKind(els);
    const items = shuffle(rng, visuals.concat(texts));
    const n = items.length;
    if(!n){   /* washi/emoji-only page: decorations still get placed below */
      washis.forEach(wa=>washiBorder(wa, page, rng));
      emojis.forEach(em=>{
        const p = findSpot(els, page, em.w, em.h, rng);
        em.x = p.x; em.y = p.y; em.placed = true; em.z = 40;
      });
      return;
    }
    let cols = clamp(Math.round(Math.sqrt(n * (u.w/u.h))), 1, Math.min(n,4));
    if(n>2 && rng()<0.3) cols = clamp(cols + (rng()<0.5?-1:1), 1, Math.min(n,4));
    const rows = Math.ceil(n/cols);
    const gap = 0.4;
    const cw = (u.w-(cols-1)*gap)/cols, ch = (u.h-(rows-1)*gap)/rows;
    items.forEach((el,i)=>{
      const c = i%cols, r = Math.floor(i/cols);
      if(el.t==='paragraph') setParagraphWidth(el, cw-0.3);
      const f = Math.min(1, (cw-0.25)/el.w, (ch-0.25)/el.h);
      if(f < 1) scaleEl(el, f);
      /* center last row if it isn't full */
      const inRow = (r === rows-1) ? n - (rows-1)*cols : cols;
      const rowW = inRow*cw + (inRow-1)*gap;
      const x0 = u.x + (u.w-rowW)/2;
      placeCenter(el, x0 + c*(cw+gap) + cw/2, u.y + r*(ch+gap) + ch/2);
      snap(el);
    });
    washis.forEach((wa,i)=>{
      if(i===0) washiBorder(wa, page, rng);
      else if(rows>1) washiDividerH(wa, page, u.y + Math.ceil(rows/2)*(ch+gap) - gap/2, rng);
      else washiBorder(wa, page, rng);
    });
    emojis.forEach(em=>{
      const p = findSpot(els, page, em.w, em.h, rng);
      em.x = p.x; em.y = p.y; em.placed = true; em.z = 40;
    });
  }
},

{ name:'Focal hero',
  score(ctx){ return ctx.counts.visuals >= 1 ? 1.3 : 0; },
  place(ctx){
    const {els, page, rng} = ctx;
    const u = page.usable;
    const {visuals, texts, washis, emojis} = byKind(els);
    const sorted = visuals.slice().sort((a,b)=>b.w*b.h - a.w*a.h);
    const focal = sorted[0];
    scaleEl(focal, rrange(rng,1.12,1.28));
    const gx = u.x + u.w*pick(rng,[0.382,0.618]);
    const gy = u.y + u.h*pick(rng,[0.382,0.618]);
    placeCenter(focal, gx, gy);
    clampToUsable(focal, page);
    focal.z = 10;
    const supports = sorted.slice(1).concat(texts);
    for(const el of supports){
      if(el.t==='paragraph') setParagraphWidth(el, Math.min(el.w, u.w*0.42));
      const prefer = el.t==='headline' ? [270,90] : [];
      placeAround(el, focal, els, page, rng, prefer);
      el.z = el.kind==='text' ? 30 : 12;
      snap(el);
    }
    washis.forEach((wa,i)=>{
      if(i===0) washiAnchor(wa, focal, Math.floor(rng()*4), rng);
      else if(rng()<0.5) washiDiagonal(wa, page, rng);
      else washiBorder(wa, page, rng);
    });
    emojis.forEach(em=>{
      const p = findSpot(els, page, em.w, em.h, rng);
      em.x = p.x; em.y = p.y; em.placed = true; em.z = 40;
    });
  }
},

{ name:'Diagonal flow',
  score(ctx){
    return 1 + (ctx.page.spine ? 0.3 : 0) + (ctx.counts.items>=4 ? 0.2 : 0);
  },
  place(ctx){
    const {els, page, rng} = ctx;
    const u = page.usable;
    const {visuals, texts, washis, emojis} = byKind(els);
    const headline = texts.find(e=>e.t==='headline');
    const rest = shuffle(rng, visuals.concat(texts.filter(e=>e!==headline)));
    const items = headline ? [headline].concat(rest) : rest;
    const leftToRight = rng() < 0.5;
    const n = items.length;
    items.forEach((el,i)=>{
      if(el.t==='paragraph') setParagraphWidth(el, Math.min(el.w, u.w*0.45));
      const t = n===1 ? 0.5 : i/(n-1);
      const tx = leftToRight ? t : 1-t;
      const cx = u.x + (0.12 + 0.76*tx)*u.w + rrange(rng,-0.05,0.05)*u.w;
      const cy = u.y + (0.10 + 0.80*t)*u.h + rrange(rng,-0.04,0.04)*u.h;
      placeCenter(el, cx, cy);
      if(el.kind!=='text') el.rot = rrange(rng,-3,3);
      el.z = el.kind==='text' ? 30 : 10+i;
      clampToUsable(el, page);
    });
    resolveOverlaps(els, page);
    washis.forEach((wa,i)=>{
      if(i===0){
        washiDiagonal(wa, page, rng);
        const flowAngle = Math.atan2(u.h, (leftToRight?1:-1)*u.w)*180/Math.PI;
        wa.rot = flowAngle + rrange(rng,-8,8);
      } else washiBorder(wa, page, rng);
    });
    emojis.forEach(em=>{
      /* fill the two corners the flow leaves empty */
      const cornerX = leftToRight ? [u.x+u.w-3, u.x+1] : [u.x+1, u.x+u.w-3];
      const bias = rng()<0.5 ? {x:cornerX[0]+1, y:u.y+2} : {x:cornerX[1]+1, y:u.y+u.h-2};
      const p = findSpot(els, page, em.w, em.h, rng, {bias});
      em.x = p.x; em.y = p.y; em.placed = true; em.z = 40;
    });
  }
},

{ name:'Columns',
  score(ctx){
    if(ctx.counts.paragraphs === 0) return 0;
    return 1 + (ctx.page.usable.w >= 11 ? 0.3 : -0.4);
  },
  place(ctx){
    const {els, page, rng} = ctx;
    const u = page.usable;
    const {visuals, texts, washis, emojis} = byKind(els);
    const three = u.w > 15 && visuals.length >= 2 && rng() < 0.5;
    const ncols = three ? 3 : 2;
    const gap = 0.6;
    let widths;
    if(ncols === 2){
      const r = pick(rng, [0.5, 0.42, 0.58]);
      widths = [u.w*r - gap/2, u.w*(1-r) - gap/2];
    } else {
      const cw = (u.w - 2*gap)/3; widths = [cw,cw,cw];
    }
    const xs = [u.x];
    for(let i=1;i<ncols;i++) xs.push(xs[i-1] + widths[i-1] + gap);
    const textCol = Math.floor(rng()*ncols);
    const colItems = Array.from({length:ncols}, ()=>[]);
    colItems[textCol] = texts.slice();
    let vi = 0;
    for(const v of visuals){
      let c = vi % ncols;
      if(c === textCol) c = (c+1) % ncols;
      colItems[c].push(v); vi++;
    }
    colItems.forEach((items, c)=>{
      if(!items.length) return;
      const colW = widths[c];
      let totalH = 0;
      for(const el of items){
        if(el.t==='paragraph') setParagraphWidth(el, colW-0.2);
        else { const f = Math.min(1, (colW-0.2)/el.w); if(f<1) scaleEl(el, f); }
        totalH += el.h;
      }
      const igap = clamp((u.h-totalH)/(items.length+1), 0.3, 2.2);
      let y = u.y + Math.max(0.2, (u.h - totalH - igap*(items.length-1))/2);
      for(const el of items){
        placeCenter(el, xs[c] + colW/2, y + el.h/2);
        el.z = el.kind==='text' ? 30 : 10;
        snap(el);
        y += el.h + igap;
      }
    });
    washis.forEach((wa,i)=>{
      if(i===0) washiDividerV(wa, page, xs[1] - gap/2, rng);
      else washiBorder(wa, page, rng);
    });
    emojis.forEach(em=>{
      const p = findSpot(els, page, em.w, em.h, rng);
      em.x = p.x; em.y = p.y; em.placed = true; em.z = 40;
    });
  }
},

{ name:'Bands',
  score(ctx){
    return 1 + (ctx.sc.size==='TN' ? 0.4 : 0) +
           (ctx.sc.orientation==='horizontal' ? 0.4 : 0);
  },
  place(ctx){
    const {els, page, rng} = ctx;
    const u = page.usable;
    const {visuals, texts, washis, emojis} = byKind(els);
    for(const el of texts) if(el.t==='paragraph') setParagraphWidth(el, u.w*0.8);
    const bands = [];
    if(visuals.length) bands.push({type:'vis', items:visuals});
    if(texts.length)   bands.push({type:'text', items:texts});
    if(emojis.length)  bands.push({type:'deco', items:emojis});
    if(bands.length > 1 && rng() < 0.5){
      const b = shuffle(rng, bands);
      /* keep decoration off the top most of the time */
      if(b[0].type==='deco' && rng()<0.7){ b.push(b.shift()); }
      bands.length = 0; bands.push(...b);
    }
    const measure = ()=>bands.map(b=>{
      if(b.type==='vis') return Math.max(...b.items.map(e=>e.h)) + 0.3;
      if(b.type==='text') return b.items.reduce((s,e)=>s+e.h, 0) + 0.4;
      return Math.max(...b.items.map(e=>e.h)) + 0.3;
    });
    let hs = measure();
    let total = hs.reduce((a,b)=>a+b, 0);
    if(total > u.h){
      const f = clamp((u.h - (total - hs[bands.findIndex(b=>b.type==='vis')] )) /
                      hs[bands.findIndex(b=>b.type==='vis')], SCALE_MIN, 1);
      for(const v of visuals) scaleEl(v, f);
      hs = measure(); total = hs.reduce((a,b)=>a+b, 0);
    }
    const pad = Math.max(0.2, (u.h-total)/(bands.length+1));
    let y = u.y + pad;
    const boundaries = [];
    bands.forEach((band,bi)=>{
      const bh = hs[bi];
      if(band.type==='vis'){
        let tw = band.items.reduce((s,e)=>s+e.w, 0) + (band.items.length-1)*0.5;
        if(tw > u.w){
          const f = (u.w - (band.items.length-1)*0.5)/(tw-(band.items.length-1)*0.5);
          for(const v of band.items) scaleEl(v, f);
          tw = band.items.reduce((s,e)=>s+e.w, 0) + (band.items.length-1)*0.5;
        }
        let x = u.x + (u.w-tw)/2;
        for(const el of band.items){
          el.x = x; el.y = y + (bh-0.3-el.h)/2; el.placed = true; el.z = 10;
          snap(el);
          x += el.w + 0.5;
        }
      } else if(band.type==='text'){
        let ty = y + 0.2;
        for(const el of band.items){
          placeCenter(el, u.x+u.w/2, ty + el.h/2);
          el.z = 30; snap(el);
          ty += el.h + 0.2;
        }
      } else {
        const step = u.w/(band.items.length+1);
        band.items.forEach((em,i)=>{
          placeCenter(em, u.x + step*(i+1), y + bh/2);
          em.z = 40;
        });
      }
      y += bh + pad;
      if(bi < bands.length-1) boundaries.push(y - pad/2);
    });
    washis.forEach((wa,i)=>{
      if(i < boundaries.length) washiDividerH(wa, page, boundaries[i], rng);
      else washiBorder(wa, page, rng);
    });
  }
},

{ name:'Scatter collage',
  score(ctx){
    return (ctx.counts.visuals + ctx.counts.emojis) >= 3 ? 1.2 : 0.4;
  },
  place(ctx){
    const {els, page, rng} = ctx;
    const u = page.usable;
    const {visuals, texts, washis, emojis} = byKind(els);
    const items = shuffle(rng, visuals.concat(texts, emojis));
    for(const el of items){
      if(el.t==='paragraph') setParagraphWidth(el, Math.min(el.w, u.w*0.5));
      const p = findSpot(els, page, el.w, el.h, rng,
                         {tries:50, avoidGutter: el.kind==='text'||el.kind==='emoji'});
      el.x = p.x; el.y = p.y; el.placed = true;
      if(el.kind==='photo'||el.kind==='sketch') el.rot = rrange(rng,2,8)*(rng()<0.5?-1:1);
      else if(el.kind==='text') el.rot = rrange(rng,-2,2);
      el.z = el.kind==='emoji' ? 40 : (el.kind==='text' ? 30 : 10 + Math.floor(rng()*8));
    }
    resolveOverlaps(els, page, 0.3);
    const photos = els.filter(e=>e.kind==='photo');
    washis.forEach((wa,i)=>{
      if(photos.length){
        const target = photos[i % photos.length];
        washiAnchor(wa, target, Math.floor(rng()*4), rng);
      } else washiDiagonal(wa, page, rng);
    });
  }
}
];

/* =====================================================================
   6. GENERATION CYCLE (PRD 7.1, 7.3)
   ===================================================================== */
function scenarioCounts(sc){
  let visuals=0, paragraphs=0, emojis=0, items=0;
  for(const e of sc.elements){
    const k = EL[e.t].kind;
    if(k==='photo'||k==='sketch') visuals++;
    if(e.t==='paragraph') paragraphs++;
    if(k==='emoji') emojis++;
    if(k!=='washi') items++;
  }
  return {visuals, paragraphs, emojis, items};
}

function pickArchetypes(sc, page, rng){
  const counts = scenarioCounts(sc);
  const ctx = {sc, page, counts};
  let pool = ARCHETYPES.map(a=>({a, w:a.score(ctx)})).filter(e=>e.w > 0);
  const picked = [];
  while(picked.length < 4 && pool.length){
    const total = pool.reduce((s,e)=>s+e.w, 0);
    let r = rng()*total;
    let idx = 0;
    for(let i=0;i<pool.length;i++){ r -= pool[i].w; if(r<=0){ idx=i; break; } }
    picked.push(pool[idx].a);
    pool.splice(idx,1);
  }
  return picked;
}

function generateSuggestions(sc, palette){
  const page = makePage(sc);
  const rngPick = mulberry32(newSeed());
  const archetypes = pickArchetypes(sc, page, rngPick);
  const counts = scenarioCounts(sc);
  return archetypes.map(arch=>{
    const seed = newSeed();
    const rng = mulberry32(seed);
    const els = prepareElements(sc, page, rng, palette);
    arch.place({sc, page, els, rng, counts});
    /* validation pass: margins, overlaps already handled per archetype,
       then gutter rules, then anchors follow photos */
    for(const el of els){
      if(!el.placed){   /* safety net: anything an archetype missed */
        const p = findSpot(els, page, el.w, el.h, rng);
        el.x = p.x; el.y = p.y; el.placed = true;
      }
      /* outer margin is a hard constraint (PRD 5.1) and wins over the
         soft 60% scale floor: force-fit anything larger than the usable area */
      const b = bbox(el);
      const f = Math.min(1, page.usable.w/b.w, page.usable.h/b.h);
      if(f < 1){
        el.w *= f; el.h *= f;
        if(el.t==='paragraph') setParagraphWidth(el, el.w);
      }
      clampToUsable(el, page);
    }
    for(const el of els) gutterFix(el, page);
    /* no element fully hidden behind another (PRD 7.3) */
    for(const el of els){
      if(el.kind==='washi') continue;
      const b = bbox(el);
      for(const other of els){
        if(other===el || other.kind==='washi' || other.z <= el.z) continue;
        if(contains(bbox(other), b)){ el.x += 1.2; el.y += 0.9; clampToUsable(el, page); }
      }
    }
    settleAnchors(els, page);
    return {arch:arch.name, seed, els, page};
  });
}

/* =====================================================================
   7. RENDERING — SVG thumbnails, 10 viewBox units per cm
   ===================================================================== */
const S = 10;

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPhoto(el, uid){
  const w = el.w*S, h = el.h*S;
  const pal = el.pal;
  const gid = `g${uid}_${el.id}`;
  const pad = Math.min(w,h)*0.055;
  let motif = '';
  if(el.motif==='landscape'){
    motif = `<circle cx="72" cy="24" r="11" fill="#f6e3b0" opacity=".9"/>
      <path d="M0 52 Q25 34 48 50 T100 46 V75 H0 Z" fill="#00000018"/>
      <path d="M0 60 Q30 46 60 58 T100 54 V75 H0 Z" fill="#00000022"/>`;
  } else if(el.motif==='city'){
    motif = `<rect x="10" y="34" width="14" height="41" fill="#00000020"/>
      <rect x="30" y="22" width="16" height="53" fill="#00000028"/>
      <rect x="52" y="40" width="12" height="35" fill="#0000001c"/>
      <rect x="70" y="28" width="17" height="47" fill="#00000024"/>
      <circle cx="84" cy="14" r="7" fill="#fdf6e3" opacity=".85"/>`;
  } else {
    motif = `<circle cx="30" cy="30" r="22" fill="#ffffff30"/>
      <circle cx="68" cy="48" r="30" fill="#00000012"/>
      <path d="M0 70 Q50 50 100 68" stroke="#ffffff50" stroke-width="4" fill="none"/>`;
  }
  const inner = el.src
    ? `<image href="${el.src}" width="100" height="75" preserveAspectRatio="xMidYMid slice"/>`
    : `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${pal[0]}"/><stop offset="1" stop-color="${pal[1]}"/>
      </linearGradient></defs>
      <rect width="100" height="75" fill="url(#${gid})"/>${motif}`;
  return `<rect width="${w}" height="${h}" fill="#fff" stroke="#d8cbb8" stroke-width="0.7"/>
    <svg x="${pad}" y="${pad}" width="${w-2*pad}" height="${h-2*pad}"
         viewBox="0 0 100 75" preserveAspectRatio="xMidYMid slice">${inner}</svg>`;
}

function renderSketch(el){
  const w = el.w*S, h = el.h*S;
  const label = h > 25 ? `<text x="${w/2}" y="${h-6}" text-anchor="middle"
    font-size="7" fill="#b9a88f" font-family="-apple-system,sans-serif">sketch</text>` : '';
  return `<rect width="${w}" height="${h}" rx="3" fill="#fffef6"
      stroke="#c9b895" stroke-width="0.9" stroke-dasharray="4 3"/>
    <path d="M${w*0.2} ${h*0.5} q ${w*0.1} ${-h*0.25} ${w*0.2} 0 t ${w*0.2} 0 t ${w*0.2} 0"
      stroke="#d5c5ab" stroke-width="1.4" fill="none" stroke-linecap="round"/>${label}`;
}

function renderWashi(el, uid){
  const w = el.w*S, h = el.h*S;
  const pid = `p${uid}_${el.id}`;
  const [c1,c2] = el.colors;
  let defs = '', fill = c1;
  if(el.pattern==='stripes'){
    defs = `<pattern id="${pid}" width="7" height="7" patternUnits="userSpaceOnUse"
        patternTransform="rotate(45)">
        <rect width="7" height="7" fill="${c1}"/><rect width="3.5" height="7" fill="${c2}"/>
      </pattern>`;
    fill = `url(#${pid})`;
  } else if(el.pattern==='dots'){
    defs = `<pattern id="${pid}" width="8" height="8" patternUnits="userSpaceOnUse">
        <rect width="8" height="8" fill="${c1}"/><circle cx="4" cy="4" r="1.6" fill="${c2}"/>
      </pattern>`;
    fill = `url(#${pid})`;
  }
  return `<defs>${defs}</defs>
    <rect width="${w}" height="${h}" fill="${fill}" opacity="0.72"/>
    <rect x="0" y="0" width="${w}" height="${h}" fill="none"
      stroke="#00000014" stroke-width="0.5"/>`;
}

function renderHeadline(el){
  const w = el.w*S, h = el.h*S;
  return `<text x="${w/2}" y="${h*0.72}" text-anchor="middle" font-size="${h*0.7}"
    fill="#4a3f35" font-family="'Snell Roundhand','Marker Felt','Bradley Hand',cursive"
    font-weight="600">${esc(el.text)}</text>`;
}

function renderParagraph(el){
  const lh = el.lh*S, fs = lh*0.72;
  let out = '';
  el.lines.forEach((ln,i)=>{
    out += `<text x="0" y="${(i+0.85)*lh}" font-size="${fs}" fill="#6b5d4f"
      font-family="'Noteworthy','Marker Felt','Segoe Print',cursive">${esc(ln)}</text>`;
  });
  return out;
}

function renderEmoji(el){
  const w = el.w*S, h = el.h*S;
  return `<text x="${w/2}" y="${h*0.82}" text-anchor="middle"
    font-size="${h*0.85}">${esc(el.char)}</text>`;
}

function renderSuggestion(sug, uid){
  const page = sug.page;
  const W = page.w*S, H = page.h*S;
  let out = `<svg viewBox="-2 -2 ${W+4} ${H+4}" xmlns="http://www.w3.org/2000/svg">`;
  out += `<rect x="0" y="0" width="${W}" height="${H}" fill="#fffefa"
    stroke="#d8cbb8" stroke-width="1"/>`;
  /* guides: margins + gutter hint (subtle, PRD 5.3) */
  out += `<rect x="${MARGIN*S}" y="${MARGIN*S}" width="${W-2*MARGIN*S}" height="${H-2*MARGIN*S}"
    fill="none" stroke="#eadfce" stroke-width="0.6" stroke-dasharray="3 4"/>`;
  if(page.gutter){
    const g = page.gutter;
    out += `<rect x="${g.x*S}" y="${g.y*S}" width="${g.w*S}" height="${g.h*S}"
      fill="#f3e9d9" opacity="0.55"/>`;
    const sp = page.spine;
    out += sp.axis==='v'
      ? `<line x1="${sp.pos*S}" y1="0" x2="${sp.pos*S}" y2="${H}" stroke="#cbb896" stroke-width="0.8"/>`
      : `<line x1="0" y1="${sp.pos*S}" x2="${W}" y2="${sp.pos*S}" stroke="#cbb896" stroke-width="0.8"/>`;
  }
  const sorted = sug.els.filter(e=>e.placed).slice().sort((a,b)=>a.z-b.z);
  for(const el of sorted){
    const cx = (el.x+el.w/2)*S, cy = (el.y+el.h/2)*S;
    let inner = '';
    if(el.kind==='photo') inner = renderPhoto(el, uid);
    else if(el.kind==='sketch') inner = renderSketch(el);
    else if(el.kind==='washi') inner = renderWashi(el, uid);
    else if(el.t==='headline') inner = renderHeadline(el);
    else if(el.t==='paragraph') inner = renderParagraph(el);
    else if(el.kind==='emoji') inner = renderEmoji(el);
    out += `<g transform="translate(${cx} ${cy}) rotate(${el.rot||0}) translate(${-el.w*S/2} ${-el.h*S/2})">${inner}</g>`;
  }
  out += '</svg>';
  return out;
}

/* =====================================================================
   8. PLACEHOLDER TEXT LIBRARY (PRD 6.6) + INPUT CONFIG
   Sources: pre-1928 public domain (Wells, Verne) and original absurdist
   lines written for this app — no copyrighted text.
   ===================================================================== */
const HEADLINE_SNIPPETS = [
  'A most improbable day', 'Field notes', 'The time traveller returns',
  'Beneath the waves', 'Ordinary miracles', 'Tea first, adventure later',
  'Twenty thousand small things', 'Improbable weather ahead'
];
const PARA_SNIPPETS = [
  'No one would have believed, in the last years of the nineteenth century, that human affairs were being watched keenly and closely.',
  'The Time Traveller (for so it will be convenient to speak of him) was expounding a recondite matter to us, and his grey eyes shone and twinkled.',
  'The year 1866 was signalised by a remarkable incident, a mysterious and puzzling phenomenon, which doubtless no one has yet forgotten.',
  'The sea is everything. It covers seven tenths of the terrestrial globe. Its breath is pure and healthy.',
  'The robot wrote its poem twice, then filed it under improbable weather. Nobody at the office minded at all.',
  'We packed one towel too many, which the guidebook insists is impossible. The guidebook has been wrong before.',
  'The alien filled out the arrival form in triplicate, asked for a receipt, and complimented our planet on its rain.',
  'Tuesday was cancelled due to poetry. We drank coffee on the pier while the tide quietly reorganized the afternoon.'
];
const EMOJI_POOL = ['✨','🌿','☕','📷','🌊','🍂','🎨','🧵'];
const randOf = arr => arr[Math.floor(Math.random()*arr.length)];

const ELEMENT_ROWS = [
  {t:'photoL',   label:'Landscape photo', hint:'10 × 7.5 cm', max:4},
  {t:'photoP',   label:'Portrait photo',  hint:'7.5 × 10 cm', max:4},
  {t:'sketchS',  label:'Small sketch',    hint:'4 × 4 cm — space to draw', max:4},
  {t:'sketchL',  label:'Large sketch',    hint:'10 × 6 cm — space to draw', max:2},
  {t:'washi',    label:'Washi tape',      hint:'1.5 cm wide strips', max:4},
  {t:'headline', label:'Headline',        hint:'hand-lettered title', max:2},
  {t:'paragraph',label:'Paragraph',       hint:'your text, size 8/10/12', max:2},
  {t:'emoji',    label:'Emoji',           hint:'small symbols', max:6}
];

/* =====================================================================
   9. UI WIRING
   ===================================================================== */
/* ---------- state ---------- */
const state = {
  size:'TN', mode:'single', orientation:'vertical', density:'balanced',
  palette:'colourful',
  counts:{photoL:1, photoP:0, sketchS:0, sketchL:0, washi:1, headline:1, paragraph:1, emoji:1},
  photoSlots:{photoL:[], photoP:[]},   /* {source:'landscape'|'city'|'abstract', src:dataURL|null} */
  headlines:[], paragraphs:[], emojis:[]
};
let sets = [null, null];   /* suggestion sets: [page1, page2] ('two' mode uses both) */
let activePage = 0;
let bestEffort = false;

const $ = id => document.getElementById(id);
const gridEl = $('grid'), warnEl = $('warn'), feasEl = $('feasWarn');

function syncDetailArrays(){
  for(const k of ['photoL','photoP']){
    const arr = state.photoSlots[k];
    while(arr.length < state.counts[k])
      arr.push({source:PHOTO_MOTIFS[arr.length % PHOTO_MOTIFS.length], src:null});
    arr.length = state.counts[k];
  }
  while(state.headlines.length < state.counts.headline) state.headlines.push({text:''});
  state.headlines.length = state.counts.headline;
  while(state.paragraphs.length < state.counts.paragraph) state.paragraphs.push({text:'', size:10});
  state.paragraphs.length = state.counts.paragraph;
  while(state.emojis.length < state.counts.emoji)
    state.emojis.push({char:EMOJI_POOL[state.emojis.length % EMOJI_POOL.length]});
  state.emojis.length = state.counts.emoji;
}

/* ---------- input screen rendering ---------- */
function renderElementRows(){
  $('elementRows').innerHTML = ELEMENT_ROWS.map(r=>`
    <div class="elrow">
      <div class="lbl">${r.label}<small>${r.hint}</small></div>
      <div class="stepper">
        <button data-step="-1" data-t="${r.t}" ${state.counts[r.t]<=0?'disabled':''} aria-label="fewer">−</button>
        <span class="val">${state.counts[r.t]}</span>
        <button data-step="1" data-t="${r.t}" ${state.counts[r.t]>=r.max?'disabled':''} aria-label="more">+</button>
      </div>
    </div>`).join('');
}

function photoSlotHtml(k, label){
  return state.photoSlots[k].map((slot,i)=>`
    <div class="slot" data-k="${k}" data-i="${i}">
      ${slot.src ? `<img src="${slot.src}" alt="">` : ''}
      <select class="photo-src">
        ${slot.src ? `<option value="__photo" selected>${label} ${i+1}: Your photo ✓</option>` : ''}
        <option value="landscape" ${!slot.src&&slot.source==='landscape'?'selected':''}>${label} ${i+1}: Landscape placeholder</option>
        <option value="city" ${!slot.src&&slot.source==='city'?'selected':''}>${label} ${i+1}: City placeholder</option>
        <option value="abstract" ${!slot.src&&slot.source==='abstract'?'selected':''}>${label} ${i+1}: Abstract placeholder</option>
      </select>
      <!-- label-wrapped file input: the only picker trigger iOS Safari
           reliably honors (programmatic .click() is ignored there) -->
      <label class="mini upload">${slot.src?'Replace':'Upload'}<input type="file" accept="image/*"></label>
    </div>`).join('');
}

function renderDetails(){
  let html = '';
  if(state.counts.photoL || state.counts.photoP){
    html += `<div class="section"><h2>Photos</h2><div class="details">`
          + photoSlotHtml('photoL','Landscape') + photoSlotHtml('photoP','Portrait')
          + `</div></div>`;
  }
  if(state.counts.headline){
    html += `<div class="section"><h2>Headline text</h2><div class="details">`
      + state.headlines.map((h,i)=>`
        <div class="slot">
          <input type="text" class="headline-in" data-i="${i}" value="${esc(h.text)}"
            placeholder="Headline ${i+1} — or tap Placeholder">
          <button class="mini headline-ph" data-i="${i}">Placeholder</button>
        </div>`).join('') + `</div></div>`;
  }
  if(state.counts.paragraph){
    html += `<div class="section"><h2>Paragraph text</h2><div class="details">`
      + state.paragraphs.map((p,i)=>`
        <textarea class="para-in" data-i="${i}"
          placeholder="Paragraph ${i+1} — write here, or tap Placeholder">${esc(p.text)}</textarea>
        <div class="slot">
          <select class="para-size" data-i="${i}">
            <option value="8" ${p.size==8?'selected':''}>Size 8 (small)</option>
            <option value="10" ${p.size==10?'selected':''}>Size 10</option>
            <option value="12" ${p.size==12?'selected':''}>Size 12 (large)</option>
          </select>
          <button class="mini para-ph" data-i="${i}">Placeholder</button>
        </div>`).join('') + `</div></div>`;
  }
  if(state.counts.emoji){
    html += `<div class="section"><h2>Emojis</h2><div class="details"><div class="slot" style="flex-wrap:wrap">`
      + state.emojis.map((e,i)=>`
        <input type="text" class="emoji-in" data-i="${i}" value="${esc(e.char)}" maxlength="4">`).join('')
      + `</div></div></div>`;
  }
  $('detailSections').innerHTML = html;
}

function renderChips(){
  const html = Object.keys(PALETTES).map(k=>{
    const p = PALETTES[k];
    const dots = p.washi.slice(0,3).map(c=>`<i style="background:${c[0]}"></i>`).join('');
    return `<button class="chip ${k===state.palette?'on':''}" data-pal="${k}">
      <span class="dots">${dots}</span>${p.label}</button>`;
  }).join('');
  $('chipsInput').innerHTML = html;
  $('chipsSuggest').innerHTML = html;
}

function hideFeas(){ feasEl.classList.remove('show'); }

/* ---------- scenario from state ---------- */
function buildScenario(){
  const els = [];
  for(const k of ['photoL','photoP']) for(const slot of state.photoSlots[k])
    els.push({t:k, motif:slot.src?null:slot.source, src:slot.src});
  for(let i=0;i<state.counts.sketchS;i++) els.push({t:'sketchS'});
  for(let i=0;i<state.counts.sketchL;i++) els.push({t:'sketchL'});
  let filled = false;
  for(const h of state.headlines){
    if(!h.text.trim()){ h.text = randOf(HEADLINE_SNIPPETS); filled = true; }
    els.push({t:'headline', text:h.text.trim()});
  }
  for(const p of state.paragraphs){
    if(!p.text.trim()){ p.text = randOf(PARA_SNIPPETS); filled = true; }
    els.push({t:'paragraph', text:p.text.trim(), size:+p.size});
  }
  if(filled) renderDetails();   /* show the auto-inserted placeholder text */
  for(let i=0;i<state.counts.washi;i++) els.push({t:'washi'});
  for(const em of state.emojis) els.push({t:'emoji', char:em.char||'✨'});
  return {size:state.size, orientation:state.orientation,
          mode:state.mode==='spread'?'spread':'single',
          density:state.density, elements:els};
}

/* ---------- generate flow ---------- */
function showScreen(name){
  $('screen-input').classList.toggle('hidden', name!=='input');
  $('screen-suggest').classList.toggle('hidden', name!=='suggest');
  window.scrollTo(0,0);
}

function onGenerate(force){
  const sc = buildScenario();
  if(!sc.elements.length){
    feasEl.innerHTML = 'Add at least one element first.';
    feasEl.classList.add('show');
    return;
  }
  const page = makePage(sc);
  bestEffort = !feasibility(sc, page);
  if(bestEffort && !force){
    feasEl.innerHTML = `These elements won’t fit comfortably on ${state.size} at ${state.density} density
      — remove elements, increase density, or choose a larger page.
      <div class="warn-actions">
        <button id="feasProceed">Generate anyway</button>
        <button id="feasAdjust" class="ghost">Adjust inputs</button>
      </div>`;
    feasEl.classList.add('show');
    $('feasProceed').addEventListener('click', ()=>{ hideFeas(); onGenerate(true); });
    $('feasAdjust').addEventListener('click', hideFeas);
    return;
  }
  hideFeas();
  sets = [null, null]; activePage = 0;
  sets[0] = generateSuggestions(sc, PALETTES[state.palette]);
  $('pageTabs').classList.toggle('hidden', state.mode!=='two');
  $('pageTabs').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on', i===0));
  showScreen('suggest');
  renderGrid();
}

function renderGrid(){
  const sugs = sets[activePage] || [];
  const modeLabel = {single:'single page', spread:'spread', two:'two pages'}[state.mode];
  $('summary').textContent =
    `${state.size} · ${state.orientation} · ${modeLabel} · ${state.density} · ${PALETTES[state.palette].label}`;
  if(bestEffort){
    warnEl.textContent = 'Best effort: these elements don’t fit comfortably at this density.';
    warnEl.classList.add('show');
  } else warnEl.classList.remove('show');
  gridEl.innerHTML = sugs.map((s,i)=>`
    <div class="card">
      <div class="thumb">${renderSuggestion(s, activePage*4+i)}</div>
      <div class="cap"><b>${s.arch}</b> · seed ${s.seed % 10000}</div>
    </div>`).join('');
}

/* palette switch re-colors current suggestions without re-placing them */
function recolor(){
  const pal = PALETTES[state.palette];
  for(const set of sets){
    if(!set) continue;
    for(const sug of set){
      const rng = mulberry32(sug.seed ^ 0x9e3779b9);
      for(const el of sug.els){
        if(el.kind==='photo' && !el.src) el.pal = pick(rng, pal.photo);
        if(el.kind==='washi') el.colors = pick(rng, pal.washi);
      }
    }
  }
}

/* ---------- event wiring ---------- */
document.querySelectorAll('.seg').forEach(seg=>{
  seg.addEventListener('click', e=>{
    const b = e.target.closest('button');
    if(!b) return;
    seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
    state[seg.dataset.key] = b.dataset.v;
    hideFeas();
  });
});

$('elementRows').addEventListener('click', e=>{
  const b = e.target.closest('button[data-step]');
  if(!b) return;
  const row = ELEMENT_ROWS.find(r=>r.t===b.dataset.t);
  state.counts[b.dataset.t] = clamp(state.counts[b.dataset.t] + (+b.dataset.step), 0, row.max);
  syncDetailArrays(); renderElementRows(); renderDetails(); hideFeas();
});

$('detailSections').addEventListener('input', e=>{
  const t = e.target;
  if(t.classList.contains('headline-in')) state.headlines[+t.dataset.i].text = t.value;
  else if(t.classList.contains('para-in')) state.paragraphs[+t.dataset.i].text = t.value;
  else if(t.classList.contains('emoji-in')) state.emojis[+t.dataset.i].char = t.value;
});
$('detailSections').addEventListener('change', e=>{
  const t = e.target;
  if(t.classList.contains('para-size')) state.paragraphs[+t.dataset.i].size = +t.value;
  else if(t.classList.contains('photo-src')){
    const slot = t.closest('.slot');
    const s = state.photoSlots[slot.dataset.k][+slot.dataset.i];
    if(t.value!=='__photo'){ s.source = t.value; s.src = null; renderDetails(); }
  } else if(t.type==='file' && t.files && t.files[0]){
    const slot = t.closest('.slot');
    const s = state.photoSlots[slot.dataset.k][+slot.dataset.i];
    const reader = new FileReader();
    reader.onload = ()=>{ s.src = reader.result; renderDetails(); };
    reader.readAsDataURL(t.files[0]);
  }
});
$('detailSections').addEventListener('click', e=>{
  const b = e.target.closest('button.mini');
  if(!b) return;
  const i = +b.dataset.i;
  if(b.classList.contains('headline-ph')){
    state.headlines[i].text = randOf(HEADLINE_SNIPPETS);
    b.closest('.slot').querySelector('.headline-in').value = state.headlines[i].text;
  } else if(b.classList.contains('para-ph')){
    state.paragraphs[i].text = randOf(PARA_SNIPPETS);
    b.closest('.details').querySelectorAll('.para-in')[i].value = state.paragraphs[i].text;
  }
});

document.addEventListener('click', e=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  state.palette = chip.dataset.pal;
  renderChips();
  if(!$('screen-suggest').classList.contains('hidden')){ recolor(); renderGrid(); }
});

$('pageTabs').addEventListener('click', e=>{
  const b = e.target.closest('button[data-p]');
  if(!b) return;
  activePage = +b.dataset.p;
  $('pageTabs').querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
  if(!sets[activePage]) sets[activePage] = generateSuggestions(buildScenario(), PALETTES[state.palette]);
  renderGrid();
});

$('generate').addEventListener('click', ()=>onGenerate(false));
$('regen').addEventListener('click', ()=>{
  sets[activePage] = generateSuggestions(buildScenario(), PALETTES[state.palette]);
  renderGrid();
});
$('back').addEventListener('click', ()=>showScreen('input'));

/* ---------- init ---------- */
syncDetailArrays();
renderElementRows();
renderDetails();
renderChips();
</script>
</body>
</html>
